services:
  - type: web
    name: ihlal-sorgu-bot
    runtime: python
    repo: https://github.com/yourusername/ihlal-sorgu-bot
    plan: free
    region: frankfurt
    buildCommand: |
      pip install -r requirements.txt
      playwright install
      playwright install-deps
    startCommand: python bot.py
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: TZ
        value: Europe/Istanbul
    healthCheckPath: /health
    autoDeploy: true
